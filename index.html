<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Checklist</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F05726'/%3E%3Cpolyline points='9,16.5 14,21.5 23,10.5' fill='none' stroke='%23ffffff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklist">
<meta name="theme-color" content="#F05726">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F05726;
    --on-bg: #fff;
    --surface: #fff;
    --surface-alt: #fdf8f6;
    --border: #F05726;
    --border-light: #F0572630;
    --border-subtle: #f0e8e2;
    --text: #2a2118;
    --text-secondary: #9a8a7a;
    --text-dim: #c8bdb2;
    --accent: #F05726;
    --accent-hover: #CC4A20;
    --accent-soft: #F057261f;
    --pink: #e8a0bf;
    --pink-soft: #f5dce8;
    --green: #4caf68;
    --green-soft: #e4f5e9;
    --red: #c0392b;
    --red-soft: #fce4e3;
    --blue-soft: #e0edf8;
    --radius: 6px;
    --radius-sm: 4px;
    --radius-xs: 3px;
  }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #F05726;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100%;
  }

  @keyframes bgDrift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @media (prefers-reduced-motion: reduce) {
    #homeView, .list-card-badge { animation: none; }
    #listView { transition: none; }
  }

  .view {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--app-h, 100%);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }

  #homeView {
    background: var(--home-bg, #F05726);
    background-size: 300% 300%;
    animation: bgDrift 22s ease-in-out infinite;
  }

  #listView {
    background: var(--list-bg, #F05726);
    z-index: 5;
    transform: translateX(calc(100% + 40px));
    transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: -10px 0 32px rgba(0,0,0,0.22);
    will-change: transform;
  }

  #listView.active { transform: translateX(0); }
  #listView.dragging { transition: none; }

  .view-inner {
    max-width: 520px;
    margin: 0 auto;
    padding:
      max(72px, calc(env(safe-area-inset-top, 0px) + 36px))
      calc(20px + env(safe-area-inset-right, 0px))
      calc(80px + env(safe-area-inset-bottom, 0px))
      calc(20px + env(safe-area-inset-left, 0px));
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--on-bg);
  }

  h1.editable { cursor: pointer; }
  h1.editable:hover { opacity: 0.85; }

  .header .count {
    font-size: 0.75rem;
    color: color-mix(in srgb, var(--on-bg) 60%, transparent);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  /* Back button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: color-mix(in srgb, var(--on-bg) 70%, transparent);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 4px 0;
    margin-bottom: 10px;
    transition: color 0.15s;
  }

  .back-btn:hover { color: var(--on-bg); }

  /* Home: list cards */
  .list-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .list-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1 / 1;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.15s;
  }

  .list-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.14);
  }

  .list-card.dragging { opacity: 0.3; }
  .list-card.drag-over { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--accent); }

  .list-card-stripe { height: 6px; width: 100%; flex-shrink: 0; }

  .list-card-body {
    padding: 14px 16px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .list-card-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }

  .list-card-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .list-card-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .list-card-actions .batch-action-btn {
    font-size: 1.05rem;
    line-height: 1;
    padding: 7px 10px;
  }

  .list-card-counts {
    font-size: 0.72rem;
    color: var(--text-secondary);
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }

  .list-card-progress {
    margin-top: auto;
    height: 5px;
    background: var(--border-subtle);
    border-radius: 3px;
    overflow: hidden;
  }

  .list-card-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .list-card-badge {
    position: absolute;
    top: 9px;
    right: 9px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: opacity 0.12s;
    animation: badgePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both,
               badgePulse 2.6s ease-in-out 0.5s infinite;
  }

  .list-card:hover .list-card-badge { opacity: 0; }

  @keyframes badgePop {
    0% { transform: scale(0); }
    70% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .new-list-card {
    background: color-mix(in srgb, var(--on-bg) 13%, transparent);
    border: 1.5px dashed color-mix(in srgb, var(--on-bg) 45%, transparent);
    border-radius: var(--radius);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    color: var(--on-bg);
    font-size: 0.82rem;
    font-weight: 600;
    transition: background 0.15s;
  }

  .new-list-card:hover { background: color-mix(in srgb, var(--on-bg) 23%, transparent); }

  .home-empty {
    color: color-mix(in srgb, var(--on-bg) 50%, transparent);
    font-size: 0.85rem;
    text-align: center;
    padding: 28px 0 8px;
  }

  /* Input */
  .input-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 12px;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .input-row input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 14px 16px;
    outline: none;
  }

  .input-row input::placeholder { color: var(--text-dim); }

  .input-row .add-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 9px 16px;
    margin-right: 6px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
    opacity: 0;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .input-row input:not(:placeholder-shown) ~ .add-btn {
    opacity: 1;
    pointer-events: all;
  }

  .add-btn:hover { background: var(--accent-hover); }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .task-list:empty { display: none; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: default;
    user-select: none;
    transition: opacity 0.2s, transform 0.2s, background 0.1s;
    border-bottom: 1px solid var(--border-subtle);
  }

  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--surface-alt); }
  .task-item.dragging { opacity: 0.2; }
  .task-item.drag-over { box-shadow: inset 0 2px 0 0 var(--accent); }

  .task-item.removing {
    opacity: 0;
    transform: translateX(14px);
  }

  .task-item.adding {
    animation: fadeUp 0.2s ease-out;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.12s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .drag-handle:active { cursor: grabbing; }
  .task-item:hover .drag-handle { opacity: 1; }

  /* Checkbox */
  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--accent);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .task-item:hover .checkbox { border-color: var(--accent-hover); }

  .checkbox svg {
    width: 10px;
    height: 10px;
    opacity: 0;
    transition: opacity 0.12s;
  }

  .task-item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-item.done .checkbox svg {
    opacity: 1;
    stroke: #fff;
  }

  /* Task text */
  .task-text {
    font-size: 0.88rem;
    flex: 1;
    cursor: pointer;
    color: var(--text);
    font-weight: 400;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  /* Delete */
  .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 5px;
    font-size: 0.85rem;
    line-height: 1;
    transition: opacity 0.12s, color 0.12s;
  }

  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--red); }

  /* Empty state */
  .empty-state {
    color: color-mix(in srgb, var(--on-bg) 42%, transparent);
    font-size: 0.85rem;
    text-align: center;
    padding: 40px 0;
  }

  /* History */
  .history-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid color-mix(in srgb, var(--on-bg) 18%, transparent);
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .history-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--on-bg);
  }

  .clear-all-btn {
    background: color-mix(in srgb, var(--on-bg) 16%, transparent);
    border: none;
    color: var(--on-bg);
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    padding: 5px 12px;
    border-radius: var(--radius-xs);
    transition: background 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .clear-all-btn:hover { background: color-mix(in srgb, var(--on-bg) 28%, transparent); }

  .batch-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .batch-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }

  .batch-header:hover { background: var(--surface-alt); }

  .batch-chevron {
    color: var(--text-dim);
    font-size: 0.4rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .batch-chevron.open { transform: rotate(90deg); }

  .batch-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    cursor: pointer;
  }

  .batch-name-input {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    background: var(--accent-soft);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-xs);
    padding: 3px 8px;
    font-family: inherit;
    outline: none;
    flex: 1;
  }

  .batch-meta {
    font-size: 0.65rem;
    color: var(--text-dim);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    background: var(--accent-soft);
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 600;
    color: var(--accent);
  }

  .batch-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.12s;
  }

  .batch-header:hover .batch-actions { opacity: 1; }

  .batch-action-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 2px 6px;
    font-size: 0.72rem;
    border-radius: var(--radius-xs);
    transition: color 0.12s, background 0.12s;
    font-family: inherit;
  }

  .batch-action-btn:hover { color: var(--accent); background: var(--accent-soft); }
  .batch-action-btn.delete-batch:hover { color: var(--red); background: var(--red-soft); }

  .batch-items {
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .batch-items.collapsed { max-height: 0 !important; }

  .batch-task {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 16px 9px 34px;
    border-top: 1px solid var(--border-subtle);
    font-size: 0.78rem;
    color: var(--text-secondary);
  }

  .batch-task-icon {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
  }

  .batch-task-icon.added { background: var(--green); }
  .batch-task-icon.completed { background: var(--accent); }
  .batch-task-icon.deleted { background: var(--red); }
  .batch-task-icon.restored { background: var(--pink); }

  .batch-task-icon.restore-icon {
    cursor: pointer;
    transition: transform 0.1s;
  }

  .batch-task-icon.restore-icon:hover { transform: scale(1.18); }

  .batch-task-text {
    flex: 1;
  }

  .batch-task .restore-btn {
    background: none;
    border: 1px solid var(--border-light);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.62rem;
    font-weight: 700;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: var(--radius-xs);
    transition: all 0.12s;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    opacity: 0;
    flex-shrink: 0;
  }

  .batch-task:hover .restore-btn { opacity: 1; }
  .batch-task .restore-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  /* Version + changelog */
  .version-footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.68rem;
    font-weight: 600;
    color: color-mix(in srgb, var(--on-bg) 45%, transparent);
    cursor: pointer;
    user-select: none;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }

  .version-footer:hover { color: color-mix(in srgb, var(--on-bg) 90%, transparent); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,33,24,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s;
  }

  .overlay.open { opacity: 1; visibility: visible; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 22px 24px;
    transform: translateY(10px) scale(0.98);
    transition: transform 0.24s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    padding: 2px 5px;
    transition: color 0.12s;
  }

  .modal-close:hover { color: var(--red); }

  /* Changelog */
  .changelog-entry { margin-bottom: 16px; }
  .changelog-entry:last-child { margin-bottom: 0; }

  .changelog-entry-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }

  .changelog-version {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .changelog-date {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .changelog-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .changelog-list li {
    font-size: 0.78rem;
    color: var(--text-secondary);
    padding-left: 14px;
    position: relative;
    line-height: 1.4;
  }

  .changelog-list li::before {
    content: '';
    position: absolute;
    left: 2px;
    top: 0.55em;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* List create/edit modal */
  .field-label {
    display: block;
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 7px;
  }

  .list-name-field {
    width: 100%;
    font-family: inherit;
    font-size: 0.88rem;
    color: var(--text);
    padding: 10px 12px;
    border: 1.5px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    outline: none;
    margin-bottom: 18px;
    transition: border-color 0.15s;
  }

  .list-name-field:focus { border-color: var(--accent); }

  .color-picker {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }

  .color-swatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.12s;
  }

  .color-swatch:hover { transform: scale(1.12); }

  .color-swatch.selected {
    transform: scale(1.12);
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--text-dim);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .modal-btn-primary, .modal-btn-secondary {
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: none;
    transition: filter 0.15s, background 0.15s;
  }

  .modal-btn-primary { background: var(--accent); color: #fff; }
  .modal-btn-primary:hover { filter: brightness(0.92); }

  .modal-btn-secondary { background: var(--border-subtle); color: var(--text-secondary); }
  .modal-btn-secondary:hover { background: #e8ddd3; }

  .modal-btn-danger { background: var(--red); }
  .modal-btn-danger:hover { filter: brightness(0.92); }

  .confirm-message {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<!-- HOME VIEW -->
<div class="view" id="homeView"><div class="view-inner">
  <div class="header">
    <h1>Lists</h1>
    <div class="count" id="listCount"></div>
  </div>
  <div class="list-grid" id="listGrid"></div>
  <div class="version-footer" id="versionFooter" onclick="openChangelog()" title="View changelog"></div>
</div></div>

<!-- LIST VIEW -->
<div class="view" id="listView"><div class="view-inner">
  <button class="back-btn" onclick="goHome()">← All lists</button>
  <div class="header">
    <h1 id="listTitle" class="editable" onclick="openListModal(activeListId)" title="Edit list"></h1>
    <div class="count" id="taskCount"></div>
  </div>

  <div class="input-row">
    <input type="text" id="newTask" placeholder="Add a task...">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <div class="task-list" id="todoList"></div>
  <div class="empty-state" id="emptyState">No tasks yet</div>

  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="clear-all-btn" onclick="clearAllHistory()">Clear All</button>
    </div>
    <div id="batchList"></div>
  </div>
</div></div>

<!-- CHANGELOG MODAL -->
<div class="overlay" id="changelogOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Changelog</span>
      <button class="modal-close" onclick="closeChangelog()" title="Close">×</button>
    </div>
    <div id="changelogBody"></div>
  </div>
</div>

<!-- LIST CREATE/EDIT MODAL -->
<div class="overlay" id="listModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="listModalTitle">New list</span>
      <button class="modal-close" onclick="closeListModal()" title="Close">×</button>
    </div>
    <label class="field-label">Name</label>
    <input type="text" class="list-name-field" id="listNameField" placeholder="e.g. Website Redesign">
    <label class="field-label">Color</label>
    <div class="color-picker" id="colorPicker"></div>
    <div class="modal-actions">
      <button class="modal-btn-secondary" onclick="closeListModal()">Cancel</button>
      <button class="modal-btn-primary" id="listModalSave" onclick="saveListModal()">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="confirmTitle">Are you sure?</span>
      <button class="modal-close" onclick="closeConfirm()" title="Close">×</button>
    </div>
    <p class="confirm-message" id="confirmMessage"></p>
    <div class="modal-actions">
      <button class="modal-btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="modal-btn-primary" id="confirmOk" onclick="runConfirm()">Confirm</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'checklist_data';
  const BRAND = '#F05726';
  const COLORS = [
    { hex: '#F05726', name: 'Orange' },
    { hex: '#7226F0', name: 'Purple' },
    { hex: '#26F0C1', name: 'Teal' },
    { hex: '#E5B82B', name: 'Yellow' },
    { hex: '#9B604C', name: 'Brown' },
  ];

  // Newest version first. Keep bullets VERY short.
  const CHANGELOG = [
    { version: '1.3.3', date: '2026-05-21', changes: [
      'Background fills the entire screen',
      'Bigger edit/delete buttons on cards',
    ]},
    { version: '1.3.1', date: '2026-05-21', changes: [
      'Color now fills behind the iOS status bar',
    ]},
    { version: '1.3.0', date: '2026-05-21', changes: [
      'New 5-color brand palette',
      'Animated home backdrop from your list colors',
      'Square list cards in a 2-column grid',
      'Drag to reorder list cards',
      'History session ends when you leave a list',
      'Checked tasks go straight to history',
      'Animated badge when a list is fully done',
      'Branded confirm dialogs (no system popups)',
      'Click a history check to restore it',
      'Swipe right on a list to go back',
      'Smooth sliding views and dialogs',
      'Home-screen icon + installable web app',
    ]},
    { version: '1.2.0', date: '2026-05-21', changes: [
      'Multiple named lists',
      'Home page with list cards',
      '7-color picker per list',
      'Progress bar on each card',
    ]},
    { version: '1.1.0', date: '2026-05-21', changes: [
      'Added version number',
      'Added changelog (click the version)',
    ]},
    { version: '1.0.0', date: '2026-05-21', changes: [
      'Add, complete and delete tasks',
      'Drag to reorder',
      'Collapsible completed section',
      'Session history with one-click restore',
      'Auto-saves to your browser',
    ]},
  ];
  const APP_VERSION = CHANGELOG[0].version;

  const defaultTodos = [
    'Search Bars for both',
    'Spacing after title',
    'What is the little pop up',
    'Moble popup for papercuts',
    'Persistent password for editing videos',
    'Tutorial popups for first timers',
    'MOve buttons above videos',
  ];

  // --- ID helper -----------------------------------------------------------
  let idSeq = 0;
  function uid() { return Date.now() * 1000 + (idSeq++ % 1000); }

  // --- State + persistence -------------------------------------------------
  function newList(name, color, todos) {
    return {
      id: uid(),
      name: name,
      color: color,
      todos: (todos || []).map(t => typeof t === 'string' ? { id: uid(), text: t } : t),
      batches: [],
    };
  }

  function loadState() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}

    let st;
    if (raw && Array.isArray(raw.lists)) {
      st = raw;
    } else if (raw && Array.isArray(raw.todos)) {
      // Migrate the old single-list format into the first list.
      st = { lists: [{
        id: uid(), name: 'Checklist', color: BRAND,
        todos: raw.todos || [], completed: raw.completed || [], batches: raw.batches || [],
      }] };
    } else {
      st = { lists: [ newList('Checklist', BRAND, defaultTodos) ] };
    }

    // Clean up empty batches; fold any old "Completed" list into history.
    st.lists.forEach(l => {
      l.todos = l.todos || [];
      l.batches = (l.batches || []).filter(b => b.events && b.events.length > 0);
      if (Array.isArray(l.completed) && l.completed.length) {
        const now = new Date().toISOString();
        l.batches.push({
          id: uid(),
          name: 'Earlier',
          startedAt: now,
          events: l.completed.map(t => ({ action: 'completed', text: t.text, at: now })),
        });
      }
      delete l.completed;
    });
    return st;
  }

  let state = loadState();
  let activeListId = null;        // null = home view
  let editingListId = null;       // list being edited in the modal (null = creating)
  let pickedColor = COLORS[0].hex;
  let sessionBatches = {};        // listId -> current batch id (this page session)
  let openBatches = {};
  let dragId = null;

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getList(id) { return state.lists.find(l => l.id === id); }
  function activeList() { return getList(activeListId); }

  // "Done" = completed events still recorded in the list's history.
  function listDone(list) {
    return list.batches.reduce((n, b) =>
      n + b.events.filter(e => e.action === 'completed').length, 0);
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- Theming -------------------------------------------------------------
  function shade(hex, amt) {
    // amt < 0 darkens toward black, amt > 0 lightens toward white
    const h = hex.replace('#', '');
    let r = parseInt(h.slice(0, 2), 16),
        g = parseInt(h.slice(2, 4), 16),
        b = parseInt(h.slice(4, 6), 16);
    const target = amt < 0 ? 0 : 255, p = Math.abs(amt);
    r = Math.round((target - r) * p) + r;
    g = Math.round((target - g) * p) + g;
    b = Math.round((target - b) * p) + b;
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  // Perceived lightness — bright colors (yellow, teal) need dark text on them.
  function isLight(hex) {
    const h = hex.replace('#', '');
    const r = parseInt(h.slice(0, 2), 16),
          g = parseInt(h.slice(2, 4), 16),
          b = parseInt(h.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6;
  }

  // Theme the list view to one color. --accent is a version readable on white.
  function themeList(color) {
    const lv = document.getElementById('listView');
    const light = isLight(color);
    const ink = light ? shade(color, -0.5) : color;
    lv.style.setProperty('--list-bg', color);
    lv.style.setProperty('--accent', ink);
    lv.style.setProperty('--accent-hover', shade(ink, -0.15));
    lv.style.setProperty('--accent-soft', ink + '1f');
    lv.style.setProperty('--border', ink);
    lv.style.setProperty('--border-light', ink + '30');
    lv.style.setProperty('--on-bg', light ? '#2a2118' : '#fff');
  }

  // Theme the home view to the blend of all list colors.
  function themeHome() {
    const hv = document.getElementById('homeView');
    const first = state.lists[0];
    hv.style.setProperty('--home-bg', homeGradient());
    hv.style.setProperty('--on-bg', first && isLight(first.color) ? '#2a2118' : '#fff');
  }

  // Home backdrop: a soft gradient of the lists' own colors. The body slowly
  // drifts its background-position, so it gently fades through them.
  function homeGradient() {
    let colors = state.lists.map(l => l.color);
    if (colors.length === 0) colors = [BRAND];
    if (colors.length === 1) {
      const c = colors[0];
      colors = [c, shade(c, 0.16), shade(c, -0.12)];
    }
    // repeat the first color so the drift loops seamlessly
    return 'linear-gradient(120deg, ' + colors.concat(colors[0]).join(', ') + ')';
  }

  // --- History batches -----------------------------------------------------
  function ensureBatch(list) {
    if (sessionBatches[list.id]) return sessionBatches[list.id];
    const now = new Date();
    const batch = {
      id: uid(),
      name: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }),
      startedAt: now.toISOString(),
      events: [],
    };
    list.batches.unshift(batch);
    sessionBatches[list.id] = batch.id;
    return batch.id;
  }

  function logEvent(action, text) {
    const list = activeList();
    if (!list) return;
    const bId = ensureBatch(list);
    const batch = list.batches.find(b => b.id === bId);
    if (batch) {
      batch.events.push({ action, text, at: new Date().toISOString() });
      saveState();
    }
  }

  // Close the active list's history session. Called whenever we leave a list.
  // An empty session (visited, but nothing changed) is discarded entirely.
  function endSession() {
    if (!activeListId) return;
    const list = getList(activeListId);
    const bId = sessionBatches[activeListId];
    if (list && bId) {
      const b = list.batches.find(x => x.id === bId);
      if (b && b.events.length === 0) {
        list.batches = list.batches.filter(x => x.id !== bId);
      }
    }
    delete sessionBatches[activeListId];
    saveState();
  }

  // --- Navigation ----------------------------------------------------------
  function goHome() {
    endSession();
    activeListId = null;
    document.getElementById('listView').classList.remove('active');
    renderHome();
  }

  function openList(id) {
    const list = getList(id);
    if (!list) return;
    endSession();
    activeListId = id;
    openBatches = {};
    ensureBatch(list);
    themeList(list.color);
    renderList();
    const lv = document.getElementById('listView');
    lv.scrollTop = 0;
    lv.classList.add('active');
  }

  function render() {
    if (activeListId) renderList();
    else renderHome();
  }

  // --- Home view -----------------------------------------------------------
  function renderHome() {
    themeHome();
    const grid = document.getElementById('listGrid');
    const count = document.getElementById('listCount');
    count.textContent = state.lists.length + (state.lists.length === 1 ? ' list' : ' lists');
    grid.innerHTML = '';

    state.lists.forEach(list => {
      const open = list.todos.length;
      const done = listDone(list);
      const total = open + done;
      const pct = total ? Math.round(done / total * 100) : 0;
      const complete = open === 0 && done > 0;

      const card = document.createElement('div');
      card.className = 'list-card';
      card.setAttribute('data-list-id', list.id);
      card.draggable = true;
      card.addEventListener('click', () => openList(list.id));
      card.addEventListener('dragstart', e => onListDragStart(e, list.id));
      card.addEventListener('dragend', onListDragEnd);
      card.addEventListener('dragover', e => onListDragOver(e, list.id));
      card.addEventListener('drop', e => onListDrop(e, list.id));
      card.innerHTML = `
        ${complete ? `<div class="list-card-badge" title="All done!"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg></div>` : ''}
        <div class="list-card-stripe" style="background:${list.color}"></div>
        <div class="list-card-body">
          <div class="list-card-head">
            <span class="list-card-name">${esc(list.name)}</span>
            <div class="list-card-actions">
              <button class="batch-action-btn" data-act="edit" title="Edit list">✎</button>
              <button class="batch-action-btn delete-batch" data-act="del" title="Delete list">×</button>
            </div>
          </div>
          <div class="list-card-counts">${open} open${done ? ' · ' + done + ' done' : ''}</div>
          <div class="list-card-progress">
            <div class="list-card-progress-fill" style="width:${pct}%;background:${list.color}"></div>
          </div>
        </div>`;

      card.querySelector('[data-act="edit"]').addEventListener('click', e => {
        e.stopPropagation();
        openListModal(list.id);
      });
      card.querySelector('[data-act="del"]').addEventListener('click', e => {
        e.stopPropagation();
        deleteList(list.id);
      });
      grid.appendChild(card);
    });

    const add = document.createElement('div');
    add.className = 'new-list-card';
    add.textContent = '+ New list';
    add.addEventListener('click', () => openListModal(null));
    grid.appendChild(add);
  }

  // Drag-reorder list cards
  let listDragId = null;

  function onListDragStart(e, id) {
    listDragId = id;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => {
      const el = document.querySelector(`.list-card[data-list-id="${id}"]`);
      if (el) el.classList.add('dragging');
    });
  }

  function onListDragEnd() {
    document.querySelectorAll('.list-card').forEach(el => el.classList.remove('dragging', 'drag-over'));
    listDragId = null;
  }

  function onListDragOver(e, id) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.list-card').forEach(el => el.classList.remove('drag-over'));
    if (id !== listDragId) {
      const el = document.querySelector(`.list-card[data-list-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }
  }

  function onListDrop(e, targetId) {
    e.preventDefault();
    if (listDragId == null || listDragId === targetId) return;
    const fromIdx = state.lists.findIndex(l => l.id === listDragId);
    const toIdx = state.lists.findIndex(l => l.id === targetId);
    if (fromIdx < 0 || toIdx < 0) return;
    const [moved] = state.lists.splice(fromIdx, 1);
    state.lists.splice(toIdx, 0, moved);
    listDragId = null;
    saveState();
    renderHome();
  }

  function deleteList(id) {
    const list = getList(id);
    if (!list) return;
    showConfirm({
      title: 'Delete list',
      message: `Delete "${list.name}"? This removes all of its tasks and history.`,
      confirmText: 'Delete list',
      danger: true,
      onConfirm: () => {
        state.lists = state.lists.filter(l => l.id !== id);
        delete sessionBatches[id];
        if (state.lists.length === 0) {
          state.lists.push(newList('Checklist', BRAND, []));
        }
        saveState();
        renderHome();
      },
    });
  }

  // --- List create/edit modal ---------------------------------------------
  function renderColorPicker() {
    const cp = document.getElementById('colorPicker');
    cp.innerHTML = '';
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (c.hex === pickedColor ? ' selected' : '');
      sw.style.background = c.hex;
      sw.title = c.name;
      sw.addEventListener('click', () => {
        pickedColor = c.hex;
        renderColorPicker();
        styleSaveBtn();
      });
      cp.appendChild(sw);
    });
  }

  function styleSaveBtn() {
    const b = document.getElementById('listModalSave');
    b.style.background = pickedColor;
    b.style.color = isLight(pickedColor) ? '#2a2118' : '#fff';
  }

  function openListModal(id) {
    editingListId = id || null;
    const list = id ? getList(id) : null;
    document.getElementById('listModalTitle').textContent = list ? 'Edit list' : 'New list';
    document.getElementById('listNameField').value = list ? list.name : '';
    pickedColor = list ? list.color : COLORS[0].hex;
    renderColorPicker();
    styleSaveBtn();
    document.getElementById('listModalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('listNameField').focus(), 50);
  }

  function closeListModal() {
    document.getElementById('listModalOverlay').classList.remove('open');
  }

  function saveListModal() {
    const name = document.getElementById('listNameField').value.trim() || 'Untitled list';
    if (editingListId) {
      const list = getList(editingListId);
      if (list) { list.name = name; list.color = pickedColor; }
    } else {
      state.lists.push(newList(name, pickedColor, []));
    }
    saveState();
    closeListModal();
    if (activeListId) {
      themeList(activeList().color);
      renderList();
    } else {
      renderHome();
    }
  }

  // --- List view: tasks ----------------------------------------------------
  const input = document.getElementById('newTask');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function addTask() {
    const list = activeList();
    if (!list) return;
    const text = input.value.trim();
    if (!text) return;
    list.todos.push({ id: uid(), text });
    logEvent('added', text);
    input.value = '';
    input.focus();
    saveState();
    render();
    const items = document.getElementById('todoList').children;
    if (items.length) items[items.length - 1].classList.add('adding');
  }

  function completeTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('removing');
    setTimeout(() => {
      const list = activeList();
      if (!list) return;
      const idx = list.todos.findIndex(t => t.id === id);
      if (idx > -1) {
        const task = list.todos.splice(idx, 1)[0];
        logEvent('completed', task.text);
        saveState();
        render();
      }
    }, 200);
  }

  function restoreFromHistory(text, batchId, eventIdx) {
    const list = activeList();
    if (!list) return;
    const b = list.batches.find(x => x.id === batchId);
    if (b) {
      b.events.splice(eventIdx, 1);
      if (b.events.length === 0) list.batches = list.batches.filter(x => x.id !== batchId);
    }
    if (!list.todos.some(t => t.text === text)) {
      list.todos.push({ id: uid(), text });
    }
    saveState();
    render();
  }

  function deleteTask(id) {
    const list = activeList();
    if (!list) return;
    const t = list.todos.find(t => t.id === id);
    if (t) logEvent('deleted', t.text);
    list.todos = list.todos.filter(t => t.id !== id);
    saveState();
    render();
  }

  function toggleBatch(batchId) {
    openBatches[batchId] = !openBatches[batchId];
    render();
  }

  function deleteBatch(batchId, e) {
    e.stopPropagation();
    const list = activeList();
    if (!list) return;
    list.batches = list.batches.filter(b => b.id !== batchId);
    saveState();
    render();
  }

  function renameBatch(batchId, e) {
    e.stopPropagation();
    const list = activeList();
    if (!list) return;
    const nameEl = document.querySelector(`[data-batch-name="${batchId}"]`);
    const current = list.batches.find(b => b.id === batchId);
    if (!nameEl || !current) return;

    const inp = document.createElement('input');
    inp.className = 'batch-name-input';
    inp.value = current.name;
    nameEl.replaceWith(inp);
    inp.focus();
    inp.select();

    function commit() {
      const val = inp.value.trim();
      if (val) current.name = val;
      saveState();
      render();
    }

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', ev => {
      if (ev.key === 'Enter') { ev.preventDefault(); inp.blur(); }
      if (ev.key === 'Escape') { inp.blur(); }
    });
  }

  function clearAllHistory() {
    const list = activeList();
    if (!list) return;
    showConfirm({
      title: 'Clear history',
      message: 'Clear all history for this list? This cannot be undone.',
      confirmText: 'Clear history',
      danger: true,
      onConfirm: () => {
        list.batches = [];
        delete sessionBatches[list.id];
        ensureBatch(list);
        saveState();
        render();
      },
    });
  }

  // Drag reorder
  function onDragStart(e, id) {
    dragId = id;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('dragging');
    });
  }

  function onDragEnd() {
    document.querySelectorAll('.task-item').forEach(el => el.classList.remove('dragging', 'drag-over'));
    dragId = null;
  }

  function onDragOver(e, id) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
    if (id !== dragId) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }
  }

  function onDrop(e, targetId) {
    e.preventDefault();
    if (dragId == null || dragId === targetId) return;
    const list = activeList();
    if (!list) return;
    const fromIdx = list.todos.findIndex(t => t.id === dragId);
    const toIdx = list.todos.findIndex(t => t.id === targetId);
    if (fromIdx < 0 || toIdx < 0) return;
    const [moved] = list.todos.splice(fromIdx, 1);
    list.todos.splice(toIdx, 0, moved);
    dragId = null;
    saveState();
    render();
  }

  function makeItem(task) {
    const div = document.createElement('div');
    div.className = 'task-item';
    div.setAttribute('data-id', task.id);
    div.draggable = true;
    div.addEventListener('dragstart', e => onDragStart(e, task.id));
    div.addEventListener('dragend', onDragEnd);
    div.addEventListener('dragover', e => onDragOver(e, task.id));
    div.addEventListener('drop', e => onDrop(e, task.id));

    div.innerHTML = `
      <div class="drag-handle" title="Drag to reorder">
        <svg width="7" height="11" viewBox="0 0 7 11" fill="currentColor">
          <rect x="1" y="0" width="1.5" height="1.5" rx="0.5"/>
          <rect x="4.5" y="0" width="1.5" height="1.5" rx="0.5"/>
          <rect x="1" y="4.5" width="1.5" height="1.5" rx="0.5"/>
          <rect x="4.5" y="4.5" width="1.5" height="1.5" rx="0.5"/>
          <rect x="1" y="9" width="1.5" height="1.5" rx="0.5"/>
          <rect x="4.5" y="9" width="1.5" height="1.5" rx="0.5"/>
        </svg>
      </div>
      <div class="checkbox" onclick="completeTask(${task.id})">
        <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <polyline points="2,6 5,9 10,3"/>
        </svg>
      </div>
      <span class="task-text" onclick="completeTask(${task.id})">${esc(task.text)}</span>
      <button class="delete-btn" onclick="event.stopPropagation();deleteTask(${task.id})" title="Delete">×</button>
    `;
    return div;
  }

  function renderList() {
    const list = activeList();
    if (!list) return;
    const todos = list.todos, batches = list.batches;

    document.getElementById('listTitle').textContent = list.name;

    const todoList = document.getElementById('todoList');
    const emptyState = document.getElementById('emptyState');
    const taskCount = document.getElementById('taskCount');

    todoList.innerHTML = '';
    todos.forEach(t => todoList.appendChild(makeItem(t)));
    emptyState.style.display = todos.length ? 'none' : 'block';
    taskCount.textContent = todos.length + (todos.length === 1 ? ' task' : ' tasks');

    // History — show every batch with events, including the live session.
    const historyBatches = batches.filter(b => b.events.length > 0);
    const historySection = document.getElementById('historySection');
    const batchListEl = document.getElementById('batchList');

    historySection.style.display = historyBatches.length ? 'block' : 'none';
    batchListEl.innerHTML = '';

    historyBatches.forEach(batch => {
      const isOpen = openBatches[batch.id];
      const card = document.createElement('div');
      card.className = 'batch-card';

      const itemsHtml = batch.events.map((ev, idx) => {
        const svgIcons = {
          added: `<svg width="10" height="10" viewBox="0 0 10 10" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>`,
          completed: `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`,
          deleted: `<svg width="10" height="10" viewBox="0 0 10 10" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg>`,
          restored: `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`
        };
        const icon = svgIcons[ev.action] || svgIcons.added;
        const dotClass = ev.action === 'added' ? 'added' : ev.action === 'completed' ? 'completed' : ev.action === 'deleted' ? 'deleted' : 'restored';
        const restoreData = `data-restore-batch="${batch.id}" data-restore-idx="${idx}"`;
        const iconEl = ev.action === 'completed'
          ? `<span class="batch-task-icon ${dotClass} restore-icon" ${restoreData} title="Uncheck & restore">${icon}</span>`
          : `<span class="batch-task-icon ${dotClass}">${icon}</span>`;
        return `<div class="batch-task">
          ${iconEl}
          <span class="batch-task-text">${esc(ev.text)}</span>
          <button class="restore-btn" ${restoreData}>Restore</button>
        </div>`;
      }).join('');

      card.innerHTML = `
        <div class="batch-header" onclick="toggleBatch(${batch.id})">
          <span class="batch-chevron ${isOpen ? 'open' : ''}">▶</span>
          <span class="batch-name" data-batch-name="${batch.id}">${esc(batch.name)}</span>
          <span class="batch-meta">${batch.events.length}</span>
          <div class="batch-actions">
            <button class="batch-action-btn" onclick="renameBatch(${batch.id}, event)" title="Rename">✎</button>
            <button class="batch-action-btn delete-batch" onclick="deleteBatch(${batch.id}, event)" title="Delete">×</button>
          </div>
        </div>
        <div class="batch-items ${isOpen ? '' : 'collapsed'}">${itemsHtml}</div>
      `;

      batchListEl.appendChild(card);

      card.querySelectorAll('[data-restore-batch]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          const bId = Number(el.dataset.restoreBatch);
          const eIdx = Number(el.dataset.restoreIdx);
          const b = list.batches.find(x => x.id === bId);
          if (b && b.events[eIdx]) {
            restoreFromHistory(b.events[eIdx].text, bId, eIdx);
          }
        });
      });

      if (isOpen) {
        const itemsEl = card.querySelector('.batch-items');
        itemsEl.style.maxHeight = itemsEl.scrollHeight + 'px';
      }
    });
  }

  // --- Changelog -----------------------------------------------------------
  function renderVersion() {
    document.getElementById('versionFooter').textContent = 'v' + APP_VERSION;
    document.getElementById('changelogBody').innerHTML = CHANGELOG.map(entry => `
      <div class="changelog-entry">
        <div class="changelog-entry-head">
          <span class="changelog-version">v${esc(entry.version)}</span>
          <span class="changelog-date">${esc(entry.date)}</span>
        </div>
        <ul class="changelog-list">
          ${entry.changes.map(c => `<li>${esc(c)}</li>`).join('')}
        </ul>
      </div>
    `).join('');
  }

  function openChangelog() {
    document.getElementById('changelogOverlay').classList.add('open');
  }

  function closeChangelog() {
    document.getElementById('changelogOverlay').classList.remove('open');
  }

  // --- Branded confirm dialog ---------------------------------------------
  let confirmAction = null;

  function showConfirm(opts) {
    document.getElementById('confirmTitle').textContent = opts.title || 'Are you sure?';
    document.getElementById('confirmMessage').textContent = opts.message || '';
    const ok = document.getElementById('confirmOk');
    ok.textContent = opts.confirmText || 'Confirm';
    ok.classList.toggle('modal-btn-danger', !!opts.danger);
    confirmAction = opts.onConfirm || null;
    document.getElementById('confirmOverlay').classList.add('open');
  }

  function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
    confirmAction = null;
  }

  function runConfirm() {
    const fn = confirmAction;
    closeConfirm();
    if (fn) fn();
  }

  // --- Wiring --------------------------------------------------------------
  document.getElementById('changelogOverlay').addEventListener('click', e => {
    if (e.target.id === 'changelogOverlay') closeChangelog();
  });

  document.getElementById('listModalOverlay').addEventListener('click', e => {
    if (e.target.id === 'listModalOverlay') closeListModal();
  });

  document.getElementById('confirmOverlay').addEventListener('click', e => {
    if (e.target.id === 'confirmOverlay') closeConfirm();
  });

  document.getElementById('listNameField').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveListModal(); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeChangelog(); closeListModal(); closeConfirm(); }
  });

  // Swipe a list to the right to slide back to all lists.
  (function () {
    const lv = document.getElementById('listView');
    let startX = 0, startY = 0, startT = 0, dx = 0;
    let tracking = false, decided = false, horizontal = false;
    const vw = () => window.innerWidth;

    lv.addEventListener('touchstart', e => {
      if (!activeListId || e.touches.length !== 1) { tracking = false; return; }
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startT = Date.now();
      dx = 0; tracking = true; decided = false; horizontal = false;
    }, { passive: true });

    lv.addEventListener('touchmove', e => {
      if (!tracking) return;
      const mx = e.touches[0].clientX - startX;
      const my = e.touches[0].clientY - startY;
      if (!decided) {
        if (Math.abs(mx) < 8 && Math.abs(my) < 8) return;
        decided = true;
        horizontal = mx > 0 && Math.abs(mx) > Math.abs(my);
        if (horizontal) {
          lv.classList.add('dragging');
          renderHome();
        }
      }
      if (!horizontal) return;
      e.preventDefault();
      dx = Math.max(0, mx);
      lv.style.transform = 'translateX(' + dx + 'px)';
    }, { passive: false });

    function endSwipe() {
      if (!tracking) return;
      tracking = false;
      if (!horizontal) return;
      lv.classList.remove('dragging');
      const v = dx / Math.max(Date.now() - startT, 1);
      lv.style.transform = '';
      if (dx > vw() * 0.32 || (v > 0.55 && dx > 45)) {
        goHome();
      }
      dx = 0;
    }
    lv.addEventListener('touchend', endSwipe);
    lv.addEventListener('touchcancel', endSwipe);
  })();

  // Pin views to the real screen height (iOS standalone miscomputes 100%).
  function setAppHeight() {
    document.documentElement.style.setProperty('--app-h', (window.innerHeight + 60) + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  renderVersion();
  goHome();
</script>
</body>
</html>
