<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Checklist</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F05726'/%3E%3Cpolyline points='9,16.5 14,21.5 23,10.5' fill='none' stroke='%23ffffff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklist">
<meta name="theme-color" content="#F05726">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Text stays selectable only where you're actually typing. */
  input { -webkit-user-select: text; user-select: text; }

  :root {
    --bg: #F05726;
    --on-bg: #fff;
    --surface: #fff;
    --surface-alt: #fdf8f6;
    --border: #F05726;
    --border-light: #F0572630;
    --border-subtle: #f0e8e2;
    --text: #2a2118;
    --text-secondary: #9a8a7a;
    --text-dim: #c8bdb2;
    --accent: #F05726;
    --accent-hover: #CC4A20;
    --accent-soft: #F057261f;
    --pink: #e8a0bf;
    --pink-soft: #f5dce8;
    --green: #4caf68;
    --green-soft: #e4f5e9;
    --red: #c0392b;
    --red-soft: #fce4e3;
    --blue-soft: #e0edf8;
    --radius: 6px;
    --radius-sm: 4px;
    --radius-xs: 3px;
  }

  html {
    height: 100%;
    overflow: hidden;
  }

  /* The animated gradient lives on <body> — the page's main background, which
     iOS reliably fills edge-to-edge in the installed app. Its box is pinned to
     the real screen height (--app-h) so it covers the home-indicator strip. */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    height: var(--app-h, 100%);
    background: var(--app-bg, #F05726);
    background-size: 300vw 300vh;
    animation: bgDrift 22s ease-in-out infinite;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  @keyframes bgDrift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @media (prefers-reduced-motion: reduce) {
    body, .list-card-badge, .card-inner { animation: none; }
    #listView { transition: none; }
  }

  .view {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--app-h, 100%);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #homeView {
    background: transparent;
    z-index: 1;
  }

  #listView {
    background: var(--list-bg, #F05726);
    z-index: 5;
    transform: translateX(calc(100% + 40px));
    transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: -10px 0 32px rgba(0,0,0,0.22);
    will-change: transform;
  }

  #listView.active { transform: translateX(0); }
  #listView.dragging { transition: none; }

  .view-inner {
    max-width: 520px;
    margin: 0 auto;
    padding:
      max(72px, calc(env(safe-area-inset-top, 0px) + 36px))
      calc(20px + env(safe-area-inset-right, 0px))
      calc(80px + env(safe-area-inset-bottom, 0px))
      calc(20px + env(safe-area-inset-left, 0px));
  }

  /* Extra room at the bottom so cards never hide behind the pinned footer. */
  #homeView .view-inner { padding-bottom: calc(116px + env(safe-area-inset-bottom, 0px)); }

  /* Settings gear + version, pinned to the bottom of the window on the home
     screen. It sits inside #homeView so the list view slides cleanly over it. */
  .home-footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    padding: 12px 16px calc(14px + env(safe-area-inset-bottom, 0px));
    pointer-events: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--on-bg);
  }

  h1.editable { cursor: pointer; }
  h1.editable:hover { opacity: 0.85; }

  .header .count {
    font-size: 0.75rem;
    color: color-mix(in srgb, var(--on-bg) 60%, transparent);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  /* Back button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: color-mix(in srgb, var(--on-bg) 70%, transparent);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 4px 0;
    margin-bottom: 10px;
    transition: color 0.15s;
  }

  .back-btn:hover { color: var(--on-bg); }

  /* Home: list cards */
  .list-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  /* Desktop: a roomier page, 4 cards per row. */
  @media (min-width: 720px) {
    #homeView .view-inner { max-width: 900px; }
    .list-grid { grid-template-columns: repeat(4, 1fr); gap: 14px; }
  }

  .list-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1 / 1;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.15s;
  }

  .list-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.14);
  }

  .list-card.pressing { transform: scale(0.95); }
  .list-card.dragging { opacity: 0; }

  /* The floating clone that follows your finger while dragging a card. */
  .list-card.lifted {
    position: fixed;
    margin: 0;
    z-index: 300;
    pointer-events: none;
    cursor: grabbing;
    box-shadow: 0 22px 46px rgba(0,0,0,0.34);
    transition: none;
  }

  /* Inner wrapper holds the iOS-style wiggle, so it never fights the
     slide animation that runs on the card itself. */
  .card-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .list-grid.reordering .list-card:hover { transform: none; }

  .list-card-stripe { height: 6px; width: 100%; flex-shrink: 0; }

  .list-card-body {
    padding: 14px 16px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .list-card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .list-card-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }

  .list-card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Playful round icon buttons on each card. */
  .card-icon-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--accent-soft);
    color: var(--accent);
    transition: transform 0.13s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.13s;
  }

  .card-icon-btn:hover { transform: scale(1.18) rotate(-8deg); }
  .card-icon-btn:active { transform: scale(0.88); }
  .card-icon-btn.danger { background: var(--red-soft); color: var(--red); }
  .card-icon-btn.danger:hover { transform: scale(1.18) rotate(8deg); }

  /* List card ⋯ menu */
  .card-menu {
    position: fixed;
    z-index: 95;
    display: none;
    flex-direction: column;
    min-width: 150px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    box-shadow: 0 10px 30px rgba(0,0,0,0.26);
    padding: 5px;
  }

  .card-menu.open { display: flex; }

  .card-menu-item {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.84rem;
    font-weight: 600;
    text-align: left;
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-xs);
    cursor: pointer;
    transition: background 0.1s;
  }

  .card-menu-item:hover { background: var(--surface-alt); }
  .card-menu-item.danger { color: var(--red); }
  .card-menu-item.danger:hover { background: var(--red-soft); }

  .list-card-counts {
    font-size: 0.72rem;
    color: var(--text-secondary);
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }

  .list-card-progress {
    margin-top: auto;
    height: 5px;
    background: var(--border-subtle);
    border-radius: 3px;
    overflow: hidden;
  }

  .list-card-progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .list-card-badge {
    position: absolute;
    top: 9px;
    right: 9px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: opacity 0.12s;
    animation: badgePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both,
               badgePulse 2.6s ease-in-out 0.5s infinite;
  }

  .list-card:hover .list-card-badge { opacity: 0; }

  @keyframes badgePop {
    0% { transform: scale(0); }
    70% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .new-list-card {
    background: color-mix(in srgb, var(--on-bg) 13%, transparent);
    border: 1.5px dashed color-mix(in srgb, var(--on-bg) 45%, transparent);
    border-radius: var(--radius);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    color: var(--on-bg);
    font-size: 0.82rem;
    font-weight: 600;
    transition: background 0.15s;
  }

  .new-list-card:hover { background: color-mix(in srgb, var(--on-bg) 23%, transparent); }

  .home-empty {
    color: color-mix(in srgb, var(--on-bg) 50%, transparent);
    font-size: 0.85rem;
    text-align: center;
    padding: 28px 0 8px;
  }

  /* Input */
  .input-row {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 12px;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .input-row input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 0.88rem;
    padding: 14px 16px;
    outline: none;
  }

  .input-row input::placeholder { color: var(--text-dim); }

  .input-row .add-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 9px 16px;
    margin-right: 6px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
    opacity: 0;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .input-row input:not(:placeholder-shown) ~ .add-btn {
    opacity: 1;
    pointer-events: all;
  }

  .add-btn:hover { background: var(--accent-hover); }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .task-list:empty { display: none; }

  .task-item {
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border-subtle);
  }

  .task-item:last-child { border-bottom: none; }
  .task-item.dragging { opacity: 0.2; }
  .task-item.drag-over { box-shadow: inset 0 2px 0 0 var(--accent); }
  .task-item.exiting { transition: max-height 0.26s ease; }

  .task-item.adding { animation: fadeUp 0.28s cubic-bezier(0.34, 1.35, 0.64, 1); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(-9px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Colour reveal behind a row while it is being swiped */
  .task-action-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    background: var(--surface-alt);
  }

  .task-action-bg .ta-icon {
    display: flex;
    opacity: 0;
    transition: opacity 0.12s, transform 0.12s;
  }

  .ta-complete { color: var(--green); }
  .ta-delete { color: var(--red); }
  .task-action-bg.show-complete { background: var(--green-soft); }
  .task-action-bg.show-complete .ta-complete { opacity: 1; }
  .task-action-bg.show-delete { background: var(--red-soft); }
  .task-action-bg.show-delete .ta-delete { opacity: 1; }
  .task-action-bg.armed.show-complete { background: var(--green); }
  .task-action-bg.armed.show-delete { background: var(--red); }
  .task-action-bg.armed .ta-icon { color: #fff; transform: scale(1.3); }

  /* Sliding foreground of a row */
  .task-face {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
  }

  .task-face:hover { background: var(--surface-alt); }

  .task-item.swiping .task-face {
    transition: none;
    box-shadow: 0 0 16px rgba(0,0,0,0.16);
  }

  /* Drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.12s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .drag-handle:active { cursor: grabbing; }
  .task-face:hover .drag-handle { opacity: 1; }

  /* Checkbox */
  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--accent);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .task-face:hover .checkbox { border-color: var(--accent-hover); }

  .checkbox svg {
    width: 10px;
    height: 10px;
    opacity: 0;
    transition: opacity 0.12s;
  }

  /* Task text */
  .task-text {
    font-size: 0.88rem;
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
    color: var(--text);
    font-weight: 400;
  }

  /* Delete */
  .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 5px;
    font-size: 0.85rem;
    line-height: 1;
    flex-shrink: 0;
    transition: opacity 0.12s, color 0.12s;
  }

  .task-face:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--red); }

  /* Full-screen colour flash on complete / delete */
  .color-pop {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    animation: colorPop 0.5s ease forwards;
  }

  @keyframes colorPop {
    0% { opacity: 0; }
    22% { opacity: 0.26; }
    100% { opacity: 0; }
  }

  /* History — completed tasks, one flat list */
  .done-list {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .done-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .done-item:last-child { border-bottom: none; }

  .done-check {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    background: var(--green);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.12s;
  }

  .done-check:hover { transform: scale(1.14); }
  .done-check svg { width: 11px; height: 11px; }

  .done-text {
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
    font-size: 0.84rem;
    color: var(--text-dim);
    text-decoration: line-through;
  }

  .done-del {
    opacity: 0.4;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 5px;
    font-size: 0.85rem;
    line-height: 1;
    flex-shrink: 0;
    transition: opacity 0.12s, color 0.12s;
  }

  .done-item:hover .done-del { opacity: 1; }
  .done-del:hover { color: var(--red); }

  .done-enter { animation: doneEnter 0.4s cubic-bezier(0.34, 1.3, 0.64, 1); }
  @keyframes doneEnter {
    from { opacity: 0; transform: translateY(-12px) scale(0.92); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* A row clone that swirls down into History when a task is completed */
  .swirl-clone {
    z-index: 60;
    pointer-events: none;
    border-radius: var(--radius-sm);
    box-shadow: 0 10px 28px rgba(0,0,0,0.22);
    transition: transform 0.4s cubic-bezier(0.4,0,0.6,1), opacity 0.34s ease 0.1s;
  }

  .swirl-clone.go {
    transform: translateY(150px) scale(0.94);
    opacity: 0;
  }

  /* Empty state */
  .empty-state {
    color: color-mix(in srgb, var(--on-bg) 42%, transparent);
    font-size: 0.85rem;
    text-align: center;
    padding: 40px 0;
  }

  /* History */
  .history-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid color-mix(in srgb, var(--on-bg) 18%, transparent);
  }

  .history-header {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 14px;
    cursor: pointer;
  }

  .history-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--on-bg);
  }

  .history-chevron {
    font-size: 0.5rem;
    color: color-mix(in srgb, var(--on-bg) 60%, transparent);
    transition: transform 0.2s;
  }

  .history-chevron.open { transform: rotate(90deg); }

  .history-count {
    font-size: 0.74rem;
    font-weight: 600;
    color: color-mix(in srgb, var(--on-bg) 55%, transparent);
    font-variant-numeric: tabular-nums;
    margin-right: auto;
  }

  #completedList {
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .clear-all-btn {
    background: color-mix(in srgb, var(--on-bg) 16%, transparent);
    border: none;
    color: var(--on-bg);
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    padding: 5px 12px;
    border-radius: var(--radius-xs);
    transition: background 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .clear-all-btn:hover { background: color-mix(in srgb, var(--on-bg) 28%, transparent); }

  .batch-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
  }

  .batch-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }

  .batch-header:hover { background: var(--surface-alt); }

  .batch-chevron {
    color: var(--text-dim);
    font-size: 0.4rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .batch-chevron.open { transform: rotate(90deg); }

  .batch-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    cursor: pointer;
  }

  .batch-name-input {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    background: var(--accent-soft);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-xs);
    padding: 3px 8px;
    font-family: inherit;
    outline: none;
    flex: 1;
  }

  .batch-meta {
    font-size: 0.65rem;
    color: var(--text-dim);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    background: var(--accent-soft);
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 600;
    color: var(--accent);
  }

  .batch-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.12s;
  }

  .batch-header:hover .batch-actions { opacity: 1; }

  .batch-action-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 2px 6px;
    font-size: 0.72rem;
    border-radius: var(--radius-xs);
    transition: color 0.12s, background 0.12s;
    font-family: inherit;
  }

  .batch-action-btn:hover { color: var(--accent); background: var(--accent-soft); }
  .batch-action-btn.delete-batch:hover { color: var(--red); background: var(--red-soft); }

  .batch-items {
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .batch-items.collapsed { max-height: 0 !important; }

  .batch-task {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 16px 9px 34px;
    border-top: 1px solid var(--border-subtle);
    font-size: 0.78rem;
    color: var(--text-secondary);
  }

  .batch-task-icon {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
  }

  .batch-task-icon.added { background: var(--green); }
  .batch-task-icon.completed { background: var(--accent); }
  .batch-task-icon.deleted { background: var(--red); }
  .batch-task-icon.restored { background: var(--pink); }

  .batch-task-icon.restore-icon {
    cursor: pointer;
    transition: transform 0.1s;
  }

  .batch-task-icon.restore-icon:hover { transform: scale(1.18); }

  .batch-task-text {
    flex: 1;
  }

  .batch-task .restore-btn {
    background: none;
    border: 1px solid var(--border-light);
    color: var(--accent);
    font-family: inherit;
    font-size: 0.62rem;
    font-weight: 700;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: var(--radius-xs);
    transition: all 0.12s;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    opacity: 0;
    flex-shrink: 0;
  }

  .batch-task:hover .restore-btn { opacity: 1; }
  .batch-task .restore-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  /* Version + changelog */
  .version-footer {
    text-align: center;
    pointer-events: auto;
    font-size: 0.68rem;
    font-weight: 600;
    color: color-mix(in srgb, var(--on-bg) 45%, transparent);
    cursor: pointer;
    user-select: none;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }

  .version-footer:hover { color: color-mix(in srgb, var(--on-bg) 90%, transparent); }

  /* Settings gear */
  .settings-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: color-mix(in srgb, var(--on-bg) 14%, transparent);
    color: var(--on-bg);
    cursor: pointer;
    transition: background 0.15s, transform 0.25s ease;
  }

  .settings-btn:hover {
    background: color-mix(in srgb, var(--on-bg) 24%, transparent);
    transform: rotate(45deg);
  }

  .settings-btn:active { transform: rotate(45deg) scale(0.9); }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,33,24,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s;
  }

  .overlay.open { opacity: 1; visibility: visible; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 22px 24px;
    transform: translateY(10px) scale(0.98);
    transition: transform 0.24s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    padding: 2px 5px;
    transition: color 0.12s;
  }

  .modal-close:hover { color: var(--red); }

  /* Changelog */
  .changelog-entry { margin-bottom: 16px; }
  .changelog-entry:last-child { margin-bottom: 0; }

  .changelog-entry-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }

  .changelog-version {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .changelog-date {
    font-size: 0.65rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .changelog-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .changelog-list li {
    font-size: 0.78rem;
    color: var(--text-secondary);
    padding-left: 14px;
    position: relative;
    line-height: 1.4;
  }

  .changelog-list li::before {
    content: '';
    position: absolute;
    left: 2px;
    top: 0.55em;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* List create/edit modal */
  .field-label {
    display: block;
    font-size: 0.66rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 7px;
  }

  .list-name-field {
    width: 100%;
    font-family: inherit;
    font-size: 0.88rem;
    color: var(--text);
    padding: 10px 12px;
    border: 1.5px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    outline: none;
    margin-bottom: 18px;
    transition: border-color 0.15s;
  }

  .list-name-field:focus { border-color: var(--accent); }

  .color-picker {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }

  .color-swatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.12s;
  }

  .color-swatch:hover { transform: scale(1.12); }

  .color-swatch.selected {
    transform: scale(1.12);
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--text-dim);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .modal-btn-primary, .modal-btn-secondary {
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: none;
    transition: filter 0.15s, background 0.15s;
  }

  .modal-btn-primary { background: var(--accent); color: #fff; }
  .modal-btn-primary:hover { filter: brightness(0.92); }

  .modal-btn-secondary { background: var(--border-subtle); color: var(--text-secondary); }
  .modal-btn-secondary:hover { background: #e8ddd3; }

  .modal-btn-danger { background: var(--red); }
  .modal-btn-danger:hover { filter: brightness(0.92); }

  .confirm-message {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<!-- HOME VIEW -->
<div class="view" id="homeView"><div class="view-inner">
  <div class="header">
    <h1>Lists</h1>
    <div class="count" id="listCount"></div>
  </div>
  <div class="list-grid" id="listGrid"></div>
  </div>
  <div class="home-footer">
  <button class="settings-btn" id="settingsBtn" onclick="openSettings()" title="Settings" aria-label="Settings">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div class="version-footer" id="versionFooter" onclick="openChangelog()" title="View changelog"></div>
</div></div>

<!-- LIST VIEW -->
<div class="view" id="listView"><div class="view-inner">
  <button class="back-btn" onclick="goHome()">← All lists</button>
  <div class="header">
    <h1 id="listTitle" class="editable" onclick="openListModal(activeListId)" title="Edit list"></h1>
    <div class="count" id="taskCount"></div>
  </div>

  <div class="input-row">
    <input type="text" id="newTask" placeholder="Add a task...">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <div class="task-list" id="todoList"></div>
  <div class="empty-state" id="emptyState">No tasks yet</div>

  <div class="history-section" id="historySection" style="display:none;">
    <div class="history-header" onclick="toggleHistory()">
      <span class="history-chevron" id="historyChevron">▶</span>
      <span class="history-title">History</span>
      <span class="history-count" id="historyCount"></span>
      <button class="clear-all-btn" onclick="event.stopPropagation();clearAllHistory()">Clear All</button>
    </div>
    <div id="completedList" class="done-list"></div>
  </div>
</div></div>

<!-- CHANGELOG MODAL -->
<div class="overlay" id="changelogOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Changelog</span>
      <button class="modal-close" onclick="closeChangelog()" title="Close">×</button>
    </div>
    <div id="changelogBody"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="modal-close" onclick="closeSettings()" title="Close">×</button>
    </div>
    <p class="confirm-message" style="margin-bottom:0;">Nothing here yet.</p>
  </div>
</div>

<!-- LIST CREATE/EDIT MODAL -->
<div class="overlay" id="listModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="listModalTitle">New list</span>
      <button class="modal-close" onclick="closeListModal()" title="Close">×</button>
    </div>
    <label class="field-label">Name</label>
    <input type="text" class="list-name-field" id="listNameField" placeholder="e.g. Website Redesign">
    <label class="field-label">Color</label>
    <div class="color-picker" id="colorPicker"></div>
    <div class="modal-actions">
      <button class="modal-btn-secondary" onclick="closeListModal()">Cancel</button>
      <button class="modal-btn-primary" id="listModalSave" onclick="saveListModal()">Save</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="overlay" id="confirmOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="confirmTitle">Are you sure?</span>
      <button class="modal-close" onclick="closeConfirm()" title="Close">×</button>
    </div>
    <p class="confirm-message" id="confirmMessage"></p>
    <div class="modal-actions">
      <button class="modal-btn-secondary" onclick="closeConfirm()">Cancel</button>
      <button class="modal-btn-primary" id="confirmOk" onclick="runConfirm()">Confirm</button>
    </div>
  </div>
</div>

<!-- LIST CARD ⋯ MENU -->
<div class="card-menu" id="cardMenu">
  <button class="card-menu-item" data-act="edit">Edit list</button>
  <button class="card-menu-item danger" data-act="del">Delete list</button>
</div>

<script>
  const STORAGE_KEY = 'checklist_data';
  const BRAND = '#F05726';
  const COLORS = [
    { hex: '#F05726', name: 'Orange' },
    { hex: '#7226F0', name: 'Purple' },
    { hex: '#26F0C1', name: 'Teal' },
    { hex: '#E5B82B', name: 'Yellow' },
    { hex: '#9B604C', name: 'Brown' },
  ];

  // Newest version first. Keep bullets VERY short.
  const CHANGELOG = [
    { version: '1.4.3', date: '2026-05-21', changes: [
      'Completed tasks slide down into History',
      'History is one list now — collapsible, no session groups',
      'List edit + delete tucked into a ⋯ menu on each card',
    ]},
    { version: '1.4.2', date: '2026-05-21', changes: [
      'Swipe a task right to complete it, left to delete it',
      'Completing or deleting plays a colour flash + slide-off',
    ]},
    { version: '1.4.1', date: '2026-05-21', changes: [
      'Cards slide aside as you drag — no more pop',
      'Text can no longer be selected or highlighted by accident',
    ]},
    { version: '1.4.0', date: '2026-05-21', changes: [
      'Press and hold a list card to drag it into a new order',
      'Drag-reorder now works on phone, not just desktop',
      '4 lists per row on a wide screen',
      'Bolder, rounder edit and delete buttons',
      'Fixed: a completed task could occasionally skip History',
    ]},
    { version: '1.3.10', date: '2026-05-21', changes: [
      'History now shows only completed tasks',
    ]},
    { version: '1.3.9', date: '2026-05-21', changes: [
      'Animated background now fills the whole screen — no band',
    ]},
    { version: '1.3.8', date: '2026-05-21', changes: [
      'Fixed the white strip at the bottom of the installed app',
      'Swipe a task left to tick it off',
      'New lists now start empty',
    ]},
    { version: '1.3.6', date: '2026-05-21', changes: [
      'Background fills the entire screen',
      'Bigger edit/delete buttons on cards',
    ]},
    { version: '1.3.1', date: '2026-05-21', changes: [
      'Color now fills behind the iOS status bar',
    ]},
    { version: '1.3.0', date: '2026-05-21', changes: [
      'New 5-color brand palette',
      'Animated home backdrop from your list colors',
      'Square list cards in a 2-column grid',
      'Drag to reorder list cards',
      'History session ends when you leave a list',
      'Checked tasks go straight to history',
      'Animated badge when a list is fully done',
      'Branded confirm dialogs (no system popups)',
      'Click a history check to restore it',
      'Swipe right on a list to go back',
      'Smooth sliding views and dialogs',
      'Home-screen icon + installable web app',
    ]},
    { version: '1.2.0', date: '2026-05-21', changes: [
      'Multiple named lists',
      'Home page with list cards',
      '7-color picker per list',
      'Progress bar on each card',
    ]},
    { version: '1.1.0', date: '2026-05-21', changes: [
      'Added version number',
      'Added changelog (click the version)',
    ]},
    { version: '1.0.0', date: '2026-05-21', changes: [
      'Add, complete and delete tasks',
      'Drag to reorder',
      'Collapsible completed section',
      'Session history with one-click restore',
      'Auto-saves to your browser',
    ]},
  ];
  const APP_VERSION = CHANGELOG[0].version;

  // --- ID helper -----------------------------------------------------------
  let idSeq = 0;
  function uid() { return Date.now() * 1000 + (idSeq++ % 1000); }

  // --- State + persistence -------------------------------------------------
  function newList(name, color, todos) {
    return {
      id: uid(),
      name: name,
      color: color,
      todos: (todos || []).map(t => typeof t === 'string' ? { id: uid(), text: t } : t),
      completed: [],
    };
  }

  function loadState() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}

    let st;
    if (raw && Array.isArray(raw.lists)) {
      st = raw;
    } else if (raw && Array.isArray(raw.todos)) {
      // Migrate the old single-list format into the first list.
      st = { lists: [{
        id: uid(), name: 'Checklist', color: BRAND,
        todos: raw.todos || [], completed: raw.completed || [], batches: raw.batches || [],
      }] };
    } else {
      st = { lists: [ newList('Checklist', BRAND, []) ] };
    }

    // Completed tasks live in one flat list; migrate any old session "batches".
    st.lists.forEach(l => {
      l.todos = l.todos || [];
      const done = Array.isArray(l.completed) ? l.completed.slice() : [];
      (l.batches || []).forEach(b => {
        (b.events || []).forEach(e => {
          if (e.action === 'completed') done.push({ text: e.text, at: e.at });
        });
      });
      l.completed = done.map(c => ({ id: c.id || uid(), text: c.text, at: c.at || null }));
      delete l.batches;
    });
    return st;
  }

  let state = loadState();
  let activeListId = null;        // null = home view
  let editingListId = null;       // list being edited in the modal (null = creating)
  let pickedColor = COLORS[0].hex;
  let flashCompletedId = null;    // id of a freshly-completed task, to animate into History
  let historyOpen = true;         // is the History section expanded
  let cardMenuListId = null;      // list id the ⋯ menu is currently open for
  let dragId = null;

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getList(id) { return state.lists.find(l => l.id === id); }
  function activeList() { return getList(activeListId); }

  // "Done" = how many completed tasks the list has kept.
  function listDone(list) {
    return (list.completed || []).length;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- Theming -------------------------------------------------------------
  function shade(hex, amt) {
    // amt < 0 darkens toward black, amt > 0 lightens toward white
    const h = hex.replace('#', '');
    let r = parseInt(h.slice(0, 2), 16),
        g = parseInt(h.slice(2, 4), 16),
        b = parseInt(h.slice(4, 6), 16);
    const target = amt < 0 ? 0 : 255, p = Math.abs(amt);
    r = Math.round((target - r) * p) + r;
    g = Math.round((target - g) * p) + g;
    b = Math.round((target - b) * p) + b;
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  // Perceived lightness — bright colors (yellow, teal) need dark text on them.
  function isLight(hex) {
    const h = hex.replace('#', '');
    const r = parseInt(h.slice(0, 2), 16),
          g = parseInt(h.slice(2, 4), 16),
          b = parseInt(h.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.6;
  }

  // Theme the list view to one color. --accent is a version readable on white.
  function themeList(color) {
    const lv = document.getElementById('listView');
    const light = isLight(color);
    const ink = light ? shade(color, -0.5) : color;
    document.documentElement.style.setProperty('--app-bg', color);
    lv.style.setProperty('--list-bg', color);
    lv.style.setProperty('--accent', ink);
    lv.style.setProperty('--accent-hover', shade(ink, -0.15));
    lv.style.setProperty('--accent-soft', ink + '1f');
    lv.style.setProperty('--border', ink);
    lv.style.setProperty('--border-light', ink + '30');
    lv.style.setProperty('--on-bg', light ? '#2a2118' : '#fff');
  }

  // Theme the home view to the blend of all list colors.
  function themeHome() {
    const first = state.lists[0];
    document.documentElement.style.setProperty('--app-bg', homeGradient());
    document.getElementById('homeView').style.setProperty('--on-bg',
      first && isLight(first.color) ? '#2a2118' : '#fff');
  }

  // Home backdrop: a soft gradient of the lists' own colors. The body slowly
  // drifts its background-position, so it gently fades through them.
  function homeGradient() {
    let colors = state.lists.map(l => l.color);
    if (colors.length === 0) colors = [BRAND];
    if (colors.length === 1) {
      const c = colors[0];
      colors = [c, shade(c, 0.16), shade(c, -0.12)];
    }
    // repeat the first color so the drift loops seamlessly
    return 'linear-gradient(120deg, ' + colors.concat(colors[0]).join(', ') + ')';
  }

  // --- Navigation ----------------------------------------------------------
  function goHome() {
    activeListId = null;
    document.getElementById('listView').classList.remove('active');
    renderHome();
  }

  function openList(id) {
    const list = getList(id);
    if (!list) return;
    activeListId = id;
    themeList(list.color);
    renderList();
    const lv = document.getElementById('listView');
    lv.scrollTop = 0;
    lv.classList.add('active');
  }

  function render() {
    if (activeListId) renderList();
    else renderHome();
  }

  // --- Home view -----------------------------------------------------------
  const MENU_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2.3"/><circle cx="12" cy="12" r="2.3"/><circle cx="19" cy="12" r="2.3"/></svg>`;

  function renderHome() {
    themeHome();
    const grid = document.getElementById('listGrid');
    const count = document.getElementById('listCount');
    count.textContent = state.lists.length + (state.lists.length === 1 ? ' list' : ' lists');
    grid.innerHTML = '';

    state.lists.forEach(list => {
      const open = list.todos.length;
      const done = listDone(list);
      const total = open + done;
      const pct = total ? Math.round(done / total * 100) : 0;
      const complete = open === 0 && done > 0;

      const card = document.createElement('div');
      card.className = 'list-card';
      card.setAttribute('data-list-id', list.id);
      card.innerHTML = `
        <div class="card-inner">
          <div class="list-card-stripe" style="background:${list.color}"></div>
          <div class="list-card-body">
            <div class="list-card-head">
              <span class="list-card-name">${esc(list.name)}</span>
              <div class="list-card-actions">
                <button class="card-icon-btn" data-act="menu" title="List options" aria-label="List options">${MENU_ICON}</button>
              </div>
            </div>
            <div class="list-card-counts">${open} open${done ? ' · ' + done + ' done' : ''}</div>
            <div class="list-card-progress">
              <div class="list-card-progress-fill" style="width:${pct}%;background:${list.color}"></div>
            </div>
          </div>
        </div>`;

      card.querySelector('[data-act="menu"]').addEventListener('click', e => {
        e.stopPropagation();
        openCardMenu(list.id, e.currentTarget);
      });

      // Tap opens the list; press-and-hold starts a drag-reorder.
      card.addEventListener('touchstart', e => {
        if (e.touches.length !== 1 || e.target.closest('.card-icon-btn')) return;
        lastHomeTouch = Date.now();
        homePressStart(list.id, card, e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });
      card.addEventListener('mousedown', e => {
        if (e.button !== 0 || e.target.closest('.card-icon-btn')) return;
        if (Date.now() - lastHomeTouch < 800) return;
        homePressStart(list.id, card, e.clientX, e.clientY);
      });

      grid.appendChild(card);
    });

    const add = document.createElement('div');
    add.className = 'new-list-card';
    add.textContent = '+ New list';
    add.addEventListener('click', () => openListModal(null));
    grid.appendChild(add);
  }

  // --- Home cards: tap to open, press-and-hold to drag-reorder -------------
  const HOLD_MS = 250;     // hold this long before a drag begins
  const HOLD_SLOP = 10;    // a move bigger than this cancels the hold (it was a scroll)

  let lastHomeTouch = 0;   // guards against mouse events synthesised after a touch
  let homeHold = null;     // pending press: { id, card, x, y, rect, timer }
  let homeDrag = null;     // active drag:   { id, source, clone, grabX, grabY, targetId }

  function homePressStart(id, card, x, y) {
    cancelHomeHold();
    if (homeDrag) return;
    homeHold = {
      id, card, x, y,
      rect: card.getBoundingClientRect(),
      timer: setTimeout(beginHomeDrag, HOLD_MS),
    };
    card.classList.add('pressing');
    document.addEventListener('touchmove', homeMove, { passive: false });
    document.addEventListener('touchend', homeUp);
    document.addEventListener('touchcancel', homeUp);
    document.addEventListener('mousemove', homeMove);
    document.addEventListener('mouseup', homeUp);
  }

  function detachHomeListeners() {
    document.removeEventListener('touchmove', homeMove, { passive: false });
    document.removeEventListener('touchend', homeUp);
    document.removeEventListener('touchcancel', homeUp);
    document.removeEventListener('mousemove', homeMove);
    document.removeEventListener('mouseup', homeUp);
  }

  function cancelHomeHold() {
    if (!homeHold) return;
    clearTimeout(homeHold.timer);
    homeHold.card.classList.remove('pressing');
    homeHold = null;
    if (!homeDrag) detachHomeListeners();
  }

  function beginHomeDrag() {
    if (!homeHold) return;
    const { id, card, x, y, rect } = homeHold;
    homeHold = null;
    const clone = card.cloneNode(true);
    clone.classList.remove('pressing');
    clone.classList.add('lifted');
    clone.style.width = rect.width + 'px';
    clone.style.height = rect.height + 'px';
    clone.style.left = '0';
    clone.style.top = '0';
    document.body.appendChild(clone);
    card.classList.remove('pressing');
    card.classList.add('dragging');
    document.getElementById('listGrid').classList.add('reordering');
    homeDrag = { id, source: card, clone, grabX: x - rect.left, grabY: y - rect.top,
                 lastOver: null, cooldownUntil: 0 };
    moveHomeDrag(x, y);
  }

  // Re-lay-out the grid with a FLIP animation so the cards visibly slide.
  function flipMove(moveFn) {
    const grid = document.getElementById('listGrid');
    const cards = [...grid.querySelectorAll('.list-card')];
    const first = cards.map(c => c.getBoundingClientRect());
    moveFn();
    cards.forEach((c, i) => {
      const l = c.getBoundingClientRect();
      const dx = first[i].left - l.left, dy = first[i].top - l.top;
      c.style.transition = 'none';
      c.style.transform = (dx || dy) ? 'translate(' + dx + 'px,' + dy + 'px)' : '';
    });
    requestAnimationFrame(() => {
      cards.forEach(c => {
        c.style.transition = 'transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1)';
        c.style.transform = '';
      });
    });
  }

  function moveHomeDrag(x, y) {
    if (!homeDrag) return;
    homeDrag.clone.style.transform =
      'translate(' + (x - homeDrag.grabX) + 'px,' + (y - homeDrag.grabY) + 'px) scale(1.05)';
    if (Date.now() < homeDrag.cooldownUntil) return;
    const under = document.elementFromPoint(x, y);
    const overCard = under && under.closest('.list-card');
    if (!overCard || overCard === homeDrag.source || overCard.classList.contains('lifted')) return;
    if (overCard === homeDrag.lastOver) return;
    homeDrag.lastOver = overCard;
    homeDrag.cooldownUntil = Date.now() + 130;
    flipMove(() => {
      const grid = homeDrag.source.parentNode;
      const cards = [...grid.querySelectorAll('.list-card')];
      const srcIdx = cards.indexOf(homeDrag.source);
      const tgtIdx = cards.indexOf(overCard);
      if (srcIdx < tgtIdx) grid.insertBefore(homeDrag.source, overCard.nextSibling);
      else grid.insertBefore(homeDrag.source, overCard);
    });
  }

  function endHomeDrag(commit) {
    if (!homeDrag) return;
    const { clone } = homeDrag;
    homeDrag = null;
    detachHomeListeners();
    clone.remove();
    const grid = document.getElementById('listGrid');
    grid.classList.remove('reordering');
    if (commit !== false) {
      const order = [...grid.querySelectorAll('.list-card')]
        .map(c => Number(c.getAttribute('data-list-id')));
      state.lists.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
      saveState();
    }
    renderHome();
  }

  function homeMove(e) {
    const pt = e.touches ? e.touches[0] : e;
    if (!pt) return;
    if (homeDrag) {
      if (e.cancelable) e.preventDefault();
      moveHomeDrag(pt.clientX, pt.clientY);
    } else if (homeHold) {
      if (Math.abs(pt.clientX - homeHold.x) > HOLD_SLOP ||
          Math.abs(pt.clientY - homeHold.y) > HOLD_SLOP) {
        cancelHomeHold();
      }
    }
  }

  function homeUp(e) {
    const cancelled = e.type === 'touchcancel';
    if (homeDrag) {
      endHomeDrag(!cancelled);
    } else if (homeHold) {
      const id = homeHold.id;
      cancelHomeHold();
      if (!cancelled) openList(id);
    }
  }

  function deleteList(id) {
    const list = getList(id);
    if (!list) return;
    showConfirm({
      title: 'Delete list',
      message: `Delete "${list.name}"? This removes all of its tasks and history.`,
      confirmText: 'Delete list',
      danger: true,
      onConfirm: () => {
        state.lists = state.lists.filter(l => l.id !== id);
        if (state.lists.length === 0) {
          state.lists.push(newList('Checklist', BRAND, []));
        }
        saveState();
        renderHome();
      },
    });
  }

  // --- List create/edit modal ---------------------------------------------
  function renderColorPicker() {
    const cp = document.getElementById('colorPicker');
    cp.innerHTML = '';
    COLORS.forEach(c => {
      const sw = document.createElement('div');
      sw.className = 'color-swatch' + (c.hex === pickedColor ? ' selected' : '');
      sw.style.background = c.hex;

  function styleSaveBtn() {
    const b = document.getElementById('listModalSave');

    b.style.color = isLight(pickedColor) ? '#2a2118' : '#fff';
  }

  function openListModal(id) {

      state.lists.push(newList(name, pickedColor, []));

  // --- List view: tasks ----------------------------------------------------
  const input = document.getElementById('newTask');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function addTask() {
    const list = activeList();
    if (!list) return;
    const text = input.value.trim();
    if (!text) return;
    list.todos.push({ id: uid(), text });
    input.value = '';
    input.focus();
    saveState();
    render();
    const items = document.getElementById('todoList').children;
    if (items.length) items[items.length - 1].classList.add('adding');

  // Slide a row off-screen, collapse its height, then run the data change.
  function exitTask(id, dir) {
    const el = document.querySelector(`.task-item[data-id="${id}"]`);
    if (!el) return;
    const face = el.querySelector('.task-face');
    const bg = el.querySelector('.task-action-bg');
    if (bg) bg.className = 'task-action-bg armed ' + (dir > 0 ? 'show-complete' : 'show-delete');
    if (face) {
      face.style.transition = 'transform 0.26s cubic-bezier(0.4,0,0.7,1), opacity 0.2s ease 0.06s';
      face.style.transform = 'translateX(' + (dir > 0 ? '108%' : '-108%') + ')';
      face.style.opacity = '0';
    }
    el.style.maxHeight = el.offsetHeight + 'px';
    requestAnimationFrame(() => {
      el.classList.add('exiting');
      el.style.maxHeight = '0';
    });
  }

  // A soft full-screen flash of colour.
  function popColor(color) {
    const f = document.createElement('div');
    f.className = 'color-pop';
    f.style.background = color;
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 520);
  }

  // Clone a row and swirl it down toward the History section.
  function swirlToHistory(el) {
    const face = el.querySelector('.task-face');
    if (!face) return;
    const rect = face.getBoundingClientRect();
    const clone = face.cloneNode(true);
    clone.className = 'task-face swirl-clone';
    clone.style.transition = '';
    clone.style.transform = '';
    clone.style.opacity = '';
    clone.style.boxShadow = '';
    clone.style.position = 'fixed';
    clone.style.left = rect.left + 'px';
    clone.style.top = rect.top + 'px';
    clone.style.width = rect.width + 'px';
    clone.style.height = rect.height + 'px';
    document.body.appendChild(clone);
    face.style.opacity = '0';
    el.style.maxHeight = el.offsetHeight + 'px';
    el.style.overflow = 'hidden';
    requestAnimationFrame(() => {
      el.classList.add('exiting');
      el.style.maxHeight = '0';
      requestAnimationFrame(() => clone.classList.add('go'));
    });
    setTimeout(() => clone.remove(), 520);
  }

  function completeTask(id) {
    const el = document.querySelector(`.task-item[data-id="${id}"]`);
    if (el) swirlToHistory(el);
    popColor('#4caf68');
    setTimeout(() => {
      const list = activeList();
      if (!list) return;
      const idx = list.todos.findIndex(t => t.id === id);
      if (idx > -1) {
        const task = list.todos.splice(idx, 1)[0];
        const cid = uid();
        if (!Array.isArray(list.completed)) list.completed = [];
        list.completed.unshift({ id: cid, text: task.text, at: new Date().toISOString() });
        flashCompletedId = cid;
        historyOpen = true;
        saveState();
        render();
      }
    }, 360);
  }

  function restoreCompleted(cid) {
    const list = activeList();
    if (!list) return;
    const idx = list.completed.findIndex(c => c.id === cid);
    if (idx > -1) {
      const c = list.completed.splice(idx, 1)[0];
      list.todos.push({ id: uid(), text: c.text });
      saveState();
      render();
    }
  }

  function deleteCompleted(cid) {
    const list = activeList();
    if (!list) return;
    list.completed = list.completed.filter(c => c.id !== cid);
    saveState();
    render();
  }

  function deleteTask(id) {
    exitTask(id, -1);
    popColor('#c0392b');
    setTimeout(() => {
      const list = activeList();
      if (!list) return;
      list.todos = list.todos.filter(t => t.id !== id);
      saveState();
      render();
    }, 300);
  }

  function clearAllHistory() {
    const list = activeList();
    if (!list) return;
    showConfirm({
      title: 'Clear history',
      message: 'Clear every completed task for this list? This cannot be undone.',
      confirmText: 'Clear history',
      danger: true,
      onConfirm: () => {
        list.completed = [];
        saveState();
        render();
      },
    });
  }

  function toggleHistory() {
    historyOpen = !historyOpen;
    render();

  // --- List card ⋯ menu ----------------------------------------------------
  function openCardMenu(listId, btn) {
    cardMenuListId = listId;
    const menu = document.getElementById('cardMenu');
    const r = btn.getBoundingClientRect();
    menu.style.top = (r.bottom + 6) + 'px';
    menu.style.right = (window.innerWidth - r.right) + 'px';
    menu.classList.add('open');
  }

  function closeCardMenu() {
    document.getElementById('cardMenu').classList.remove('open');
    cardMenuListId = null;
  }

  // Drag reorder
  function onDragStart(e, id) {
    dragId = id;
    e.dataTransfer.effectAllowed = 'move';
    requestAnimationFrame(() => {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('dragging');
    });
  }

  function onDragEnd() {
    document.querySelectorAll('.task-item').forEach(el => el.classList.remove('dragging', 'drag-over'));
    dragId = null;
  }

  function onDragOver(e, id) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
    if (id !== dragId) {
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }
  }

  function onDrop(e, targetId) {
    e.preventDefault();
    if (dragId == null || dragId === targetId) return;
    const list = activeList();
    if (!list) return;
    const fromIdx = list.todos.findIndex(t => t.id === dragId);
    const toIdx = list.todos.findIndex(t => t.id === targetId);
    if (fromIdx < 0 || toIdx < 0) return;
    const [moved] = list.todos.splice(fromIdx, 1);
    list.todos.splice(toIdx, 0, moved);
    dragId = null;
    saveState();
    render();
  }

  function makeItem(task) {
    const div = document.createElement('div');
    div.className = 'task-item';
    div.setAttribute('data-id', task.id);
    div.draggable = true;
    div.addEventListener('dragstart', e => onDragStart(e, task.id));
    div.addEventListener('dragend', onDragEnd);
    div.addEventListener('dragover', e => onDragOver(e, task.id));
    div.addEventListener('drop', e => onDrop(e, task.id));

    div.innerHTML = `
      <div class="task-action-bg">
        <span class="ta-icon ta-complete"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12.5 9.5,18 20,6.5"/></svg></span>
        <span class="ta-icon ta-delete"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>
      </div>
      <div class="task-face">
        <div class="drag-handle" title="Drag to reorder">
          <svg width="7" height="11" viewBox="0 0 7 11" fill="currentColor">
            <rect x="1" y="0" width="1.5" height="1.5" rx="0.5"/>
            <rect x="4.5" y="0" width="1.5" height="1.5" rx="0.5"/>
            <rect x="1" y="4.5" width="1.5" height="1.5" rx="0.5"/>
            <rect x="4.5" y="4.5" width="1.5" height="1.5" rx="0.5"/>
            <rect x="1" y="9" width="1.5" height="1.5" rx="0.5"/>
            <rect x="4.5" y="9" width="1.5" height="1.5" rx="0.5"/>
          </svg>
        </div>
        <div class="checkbox" data-act="check">
          <svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
            <polyline points="2,6 5,9 10,3"/>
          </svg>
        </div>
        <span class="task-text">${esc(task.text)}</span>
        <button class="delete-btn" data-act="del" title="Delete">×</button>
      </div>
    `;

    div.querySelector('[data-act="check"]').addEventListener('click', e => {
      e.stopPropagation();
      completeTask(task.id);
    });
    div.querySelector('[data-act="del"]').addEventListener('click', e => {
      e.stopPropagation();
      deleteTask(task.id);
    });

    attachTaskSwipe(div, task.id);
    return div;
  }

  // Active task: swipe right to complete, swipe left to delete.
  function attachTaskSwipe(div, id) {
    const face = div.querySelector('.task-face');
    const bg = div.querySelector('.task-action-bg');
    let x0 = 0, y0 = 0, d = 0, decided = false, horiz = false, track = false;
    const armDist = () => Math.max(64, div.offsetWidth * 0.3);

    div.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) { track = false; return; }
      x0 = e.touches[0].clientX;
      y0 = e.touches[0].clientY;
      d = 0; decided = false; horiz = false; track = true;
    }, { passive: true });

    div.addEventListener('touchmove', e => {
      if (!track) return;
      const mx = e.touches[0].clientX - x0;
      const my = e.touches[0].clientY - y0;
      if (!decided) {
        if (Math.abs(mx) < 9 && Math.abs(my) < 9) return;
        decided = true;
        horiz = Math.abs(mx) > Math.abs(my);
        if (horiz) div.classList.add('swiping');
        else { track = false; return; }
      }
      e.preventDefault();
      e.stopPropagation();
      d = mx;
      face.style.transform = 'translateX(' + d + 'px)';
      const armed = Math.abs(d) > armDist();
      bg.className = 'task-action-bg ' + (d > 0 ? 'show-complete' : 'show-delete') + (armed ? ' armed' : '');
    }, { passive: false });

    function endSwipe() {
      if (!track) return;
      track = false;
      if (!horiz) return;
      div.classList.remove('swiping');
      const armed = Math.abs(d) > armDist();
      if (armed && d > 0) {
        completeTask(id);
      } else if (armed && d < 0) {
        deleteTask(id);
      } else {
        face.style.transition = 'transform 0.2s cubic-bezier(0.2,0.8,0.2,1)';
        face.style.transform = '';
        bg.className = 'task-action-bg';
        setTimeout(() => { face.style.transition = ''; }, 220);
      }
      d = 0;
    }
    div.addEventListener('touchend', endSwipe);
    div.addEventListener('touchcancel', endSwipe);
  }

  function renderList() {
    const list = activeList();
    if (!list) return;
    const todos = list.todos;

    document.getElementById('listTitle').textContent = list.name;

    const todoList = document.getElementById('todoList');
    const emptyState = document.getElementById('emptyState');
    const taskCount = document.getElementById('taskCount');

    todoList.innerHTML = '';
    todos.forEach(t => todoList.appendChild(makeItem(t)));
    emptyState.style.display = todos.length ? 'none' : 'block';
    taskCount.textContent = todos.length + (todos.length === 1 ? ' task' : ' tasks');

    // History — a flat list of completed tasks, newest first.
    const completed = list.completed || [];
    const historySection = document.getElementById('historySection');
    const listEl = document.getElementById('completedList');

    historySection.style.display = completed.length ? 'block' : 'none';
    listEl.innerHTML = '';

    completed.forEach(c => {
      const row = document.createElement('div');
      row.className = 'done-item' + (c.id === flashCompletedId ? ' done-enter' : '');
      row.innerHTML = `
        <div class="done-check" data-act="restore" title="Restore to the list">
          <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>
        </div>
        <span class="done-text">${esc(c.text)}</span>
        <button class="done-del" data-act="del" title="Delete">×</button>
      `;
      row.querySelector('[data-act="restore"]').addEventListener('click', () => restoreCompleted(c.id));
      row.querySelector('[data-act="del"]').addEventListener('click', () => deleteCompleted(c.id));
      listEl.appendChild(row);
    });
    flashCompletedId = null;

    document.getElementById('historyCount').textContent = completed.length;
    document.getElementById('historyChevron').classList.toggle('open', historyOpen);
    listEl.style.maxHeight = historyOpen ? listEl.scrollHeight + 'px' : '0';
  }

  // --- Branded confirm dialog ---------------------------------------------
  let confirmAction = null;

  function showConfirm(opts) {
    document.getElementById('confirmTitle').textContent = opts.title || 'Are you sure?';
    document.getElementById('confirmMessage').textContent = opts.message || '';
    const ok = document.getElementById('confirmOk');

  // --- Wiring --------------------------------------------------------------

    }
  });

  document.getElementById('listModalOverlay').addEventListener('click', e => {
    if (e.target.id === 'listModalOverlay') closeListModal();
  });

  document.getElementById('confirmOverlay').addEventListener('click', e => {
    if (e.target.id === 'confirmOverlay') closeConfirm();
  });

  document.getElementById('listNameField').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveListModal(); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeChangelog(); closeSettings(); closeListModal(); closeConfirm(); closeCardMenu(); }
  });

  // Swipe a list to the right to slide back to all lists.
  (function () {
    const lv = document.getElementById('listView');
    let startX = 0, startY = 0, startT = 0, dx = 0;
    let tracking = false, decided = false, horizontal = false;
    const vw = () => window.innerWidth;

    lv.addEventListener('touchstart', e => {
      if (!activeListId || e.touches.length !== 1) { tracking = false; return; }
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startT = Date.now();
      dx = 0; tracking = true; decided = false; horizontal = false;
    }, { passive: true });

    lv.addEventListener('touchmove', e => {
      if (!tracking) return;
      const mx = e.touches[0].clientX - startX;
      const my = e.touches[0].clientY - startY;
      if (!decided) {
        if (Math.abs(mx) < 8 && Math.abs(my) < 8) return;
        decided = true;
        horizontal = mx > 0 && Math.abs(mx) > Math.abs(my);
        if (horizontal) {
          lv.classList.add('dragging');
          renderHome();
        }
      }
      if (!horizontal) return;
      e.preventDefault();
      dx = Math.max(0, mx);
      lv.style.transform = 'translateX(' + dx + 'px)';
    }, { passive: false });

    function endSwipe() {
      if (!tracking) return;
      tracking = false;
      if (!horizontal) return;
      lv.classList.remove('dragging');
      const v = dx / Math.max(Date.now() - startT, 1);
      lv.style.transform = '';
      if (dx > vw() * 0.32 || (v > 0.55 && dx > 45)) {
        goHome();
      }
      dx = 0;
    }
    lv.addEventListener('touchend', endSwipe);
    lv.addEventListener('touchcancel', endSwipe);
  })();

  // Pin views to the real screen height (iOS standalone miscomputes 100%).
  function setAppHeight() {
    const h = Math.max(window.innerHeight, window.screen.height || 0);
    document.documentElement.style.setProperty('--app-h', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  renderVersion();
  goHome();
</script>
</body>
</html>
